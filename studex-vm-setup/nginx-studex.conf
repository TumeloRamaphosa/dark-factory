#===============================================================================
# StudEx Super Agents — Nginx Configuration
# Master reverse proxy + landing page
# Deploy to: /etc/nginx/sites-available/studex-master
# Symlink to: /etc/nginx/sites-enabled/studex-master
#===============================================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=studex_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=studex_auth:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Upstream definitions
upstream studex_landing {
    server 127.0.0.1:3000;
}

upstream studex_api {
    server 127.0.0.1:8080;
}

#-------------------------------------------------------------------------------
# HTTP (port 80) — Landing page + ACME challenges
#-------------------------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # Root: serve StudEx landing page
    root /var/www/studex/landing;
    index index.html index.htm;

    # ACME challenge for Let's Encrypt (all domains)
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
        try_files $uri =404;
    }

    # Landing page routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # StudEx API subdomain
    location ~ ^/api/ {
        proxy_pass http://studex_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=studex_api burst=50 nodelay;
        limit_conn conn_limit 20;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /healthz {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Nginx status (restricted)
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
    }
}

