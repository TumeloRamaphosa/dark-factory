version: "3.8"

#===============================================================================
# StudEx Super Agents — Docker Compose Stack
# Traefik reverse proxy + n8n automation platform
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Follow logs
#   docker compose pull           # Update images
#===============================================================================

networks:
  studex-network:
    driver: bridge
    name: studex-network

volumes:
  traefik-acme:
    name: studex-traefik-acme
  n8n-data:
    name: studex-n8n-shared-data

services:
  #----------------------------------------------------------------------------
  # Traefik — Reverse Proxy + Let's Encrypt SSL
  #----------------------------------------------------------------------------
  traefik:
    image: traefik:v3.0
    container_name: studex-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
      # - "8080:8080"  # Traefik dashboard (uncomment for dev)
    environment:
      - TZ=Africa/Nairobi
    env_file:
      - ./env/traefik.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic-conf/:/etc/traefik/dynamic/:ro
      - traefik-acme:/acme
      - /etc/localtime:/etc/localtime:ro
    networks:
      - studex-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.studexagents.africa`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=studex:${HTPASSWD}"
      # Global StudEx labels
      - "studex.platform=true"
      - "studex.service=traefik"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  #----------------------------------------------------------------------------
  # n8n — Workflow Automation (shared base, per-client via provision.sh)
  #----------------------------------------------------------------------------
  # NOTE: This service provides a shared n8n template image.
  # Individual client n8n instances are spawned by provision.sh
  # with their own docker-compose.yml per client home directory.
  #
  # To spin up a standalone n8n for the platform itself:
  n8n-platform:
    image: n8nio/n8n:latest
    container_name: studex-n8n-platform
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=studex-platform
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PLATFORM_PASS:-changeme}
      - N8N_HOST=n8n.studexagents.africa
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - WEBHOOK_URL=https://n8n.studexagents.africa/
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - N8N_LOG_LEVEL=${N8N_LOG_LEVEL:-info}
      - GENERIC_TIMEZONE=Africa/Nairobi
      - NODE_ENV=production
    volumes:
      - n8n-data:/home/node/.n8n
      - /opt/studex-agents/workflows:/workflows:ro
    networks:
      - studex-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n-platform.rule=Host(`n8n.studexagents.africa`)"
      - "traefik.http.routers.n8n-platform.entrypoints=websecure"
      - "traefik.http.routers.n8n-platform.tls=true"
      - "traefik.http.routers.n8n-platform.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n-platform.loadbalancer.server.port=5678"
      - "studex.platform=true"
      - "studex.service=n8n-platform"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  #----------------------------------------------------------------------------
  # StudEx Landing Page (static site served by nginx in container)
  #----------------------------------------------------------------------------
  landing:
    image: nginx:alpine
    container_name: studex-landing
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    volumes:
      - ./landing:/usr/share/nginx/html:ro
      - ./landing/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - studex-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.studex-landing.rule=Host(`studexagents.africa`) || Host(`www.studexagents.africa`)"
      - "traefik.http.routers.studex-landing.entrypoints=web"
      - "traefik.http.routers.studex-landing.middlewares=redirect-to-https"
      - "traefik.http.routers.studex-landing-ssl.rule=Host(`studexagents.africa`) || Host(`www.studexagents.africa`)"
      - "traefik.http.routers.studex-landing-ssl.entrypoints=websecure"
      - "traefik.http.routers.studex-landing-ssl.tls=true"
      - "traefik.http.routers.studex-landing-ssl.tls.certresolver=letsencrypt"
      - "traefik.http.services.studex-landing.loadbalancer.server.port=80"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "studex.platform=true"
      - "studex.service=landing"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 60s
      timeout: 5s
      retries: 3

