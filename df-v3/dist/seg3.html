<script>
// Fix the truncated startBuild function and add resetForm
function startBuild() {
  document.getElementById('buildActions').style.display = 'none';
  document.getElementById('buildProgress').style.display = 'block';
  let pct = 0;
  const fill = document.getElementById('pfill');
  const pctEl = document.getElementById('pct');
  const iv = setInterval(() => {
    pct += Math.random() * 15;
    if (pct >= 100) {
      pct = 100;
      clearInterval(iv);
      pctEl.textContent = 'Done!';
      fill.style.width = '100%';
      return;
    }
    fill.style.width = pct + '%';
    pctEl.textContent = Math.round(pct) + '%';
  }, 400);
}

function resetForm() {
  document.getElementById('prdState').classList.add('dn');
  document.getElementById('formState').classList.remove('dn');
  document.getElementById('ideaInput').value = '';
  document.getElementById('buildActions').style.display = 'flex';
  document.getElementById('buildProgress').style.display = 'none';
  document.getElementById('pfill').style.width = '0%';
}
</script>
</body>
</html>
