function NodeCanvas() {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = 400; canvas.height = 300;
    let frame = 0;
    const nodes = Array.from({length:16}, () => ({x:Math.random()*400,y:Math.random()*300,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,r:Math.random()*2.5+1,p:Math.random()*Math.PI*2}));
    let anim;
    const draw = () => {
      ctx.clearRect(0,0,400,300);
      frame += 0.004;
      for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++) {
        const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if (d<100) { ctx.beginPath(); ctx.strokeStyle=`rgba(34,197,94,${(1-d/100)*0.25})`; ctx.lineWidth=0.7;
          ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y); ctx.stroke(); }
      }
      for (const n of nodes) {
        n.x += n.vx + Math.sin(frame+n.y*0.003)*0.25; n.y += n.vy + Math.cos(frame+n.x*0.003)*0.25;
        if (n.x<0)n.x=400; if (n.x>400)n.x=0; if (n.y<0)n.y=300; if (n.y>300)n.y=0;
        const b = 0.45 + Math.sin(frame*1.5+n.p)*0.3;
        const g = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*3.5);
        g.addColorStop(0,`rgba(74,222,128,${b})`);
        g.addColorStop(0.4,`rgba(34,197,94,${b*0.6})`);
        g.addColorStop(1,'rgba(34,197,94,0)');
        ctx.beginPath(); ctx.arc(n.x,n.y,n.r*3.5,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
        ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fillStyle=`rgba(150,255,180,${b})`; ctx.fill();
      }
      anim = requestAnimationFrame(draw);
    };
    draw();
    return () => cancelAnimationFrame(anim);
  }, []);
  return <canvas ref={ref} style={{borderRadius:'24px',maxWidth:'100%',opacity:0.85}} />;
}

              ))}
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}
